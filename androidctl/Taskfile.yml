version: '3'

tasks:
  test:
    desc: Run androidctl tests
    cmds:
      - python -m pytest

  e2e:
    desc: Run androidctl process-level e2e tests
    cmds:
      - python -m pytest tests/e2e

  lint:
    desc: Run androidctl lint and type checks
    cmds:
      - ruff check .
      - black --check .
      - mypy src

  format:
    desc: Auto-format androidctl sources
    cmds:
      - ruff check --fix .
      - black .

  quality:
    desc: Run androidctl quality gate
    cmds:
      - task: lint
      - task: test
