version: '3'
tasks:
  test:
    desc: Run contracts tests
    cmds:
      - python -m pytest

  lint:
    desc: Run contracts lint and type checks
    cmds:
      - ruff check .
      - black --check .
      - mypy src

  format:
    desc: Auto-format contracts sources
    cmds:
      - ruff check --fix .
      - black .

  quality:
    desc: Run contracts quality gate
    cmds:
      - task: lint
      - task: test
